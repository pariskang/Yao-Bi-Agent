# Repository-level CI (v0.14): every push/PR runs the full suite — the local
# "355 tests pass" claim becomes an enforced gate instead of a developer habit.
# The suite already contains the safety gates: golden benchmark (31 cases), rule
# mutation sentinels, entry-consistency matrix, adversarial guard corpus, import
# ratchet, version consistency and the model-backend wire contracts.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (dev extras only — zero-third-party-dependency core)
        run: pip install -e .[dev]
      - name: Run full test suite
        run: python -m pytest -q
