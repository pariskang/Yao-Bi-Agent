# 金标准病例集（golden cases）— 持续临床校验基准。
# 每例均为去标识化、重新编写的门诊叙述，不含任何真实患者信息。
# expected 字段表达"沈氏流派医师会如何判读"，而不是"引擎恰好输出什么"；
# 引擎结构性做不到的病例以 known_gap: true 诚实标记，单独计数、不计入准确率分母。
# 用法：python -m backend.evaluation.benchmark
golden_cases:
  - id: GC001
    description: 中年男性，久痛入络、舌暗苔腻的慢性腰腿痛
    input_text: 患者男，52岁，腰腿痛反复4年，阴雨天加重，疼痛以酸胀为主，舌暗，苔白腻，脉细，夜寐一般，胃纳可，二便调。
    expected:
      top1_syndrome: 气血痹阻证
      acceptable_syndromes: [气血痹阻证]
      formula_route_any: [独活寄生汤加减]
      safety_status: caution   # 经验路线含细辛，须医师审核
      red_flag_expected: false
    known_gap: false
  - id: GC002
    description: 中年女性，慢性腰腿痛伴湿阻舌象
    input_text: 患者女，49岁，慢性腰痛，反复腰腿痛6年，久坐后加重，舌暗，苔白腻，脉缓，胃口一般，大便正常，睡眠可。
    expected:
      top1_syndrome: 气血痹阻证
      acceptable_syndromes: [气血痹阻证]
      formula_route_any: [独活寄生汤加减]
      safety_status: caution
      red_flag_expected: false
    known_gap: false
  - id: GC003
    description: 青年男性，搬重物扭伤后固定刺痛（急性腰扭伤）
    input_text: 患者男，35岁，搬重物扭伤后腰痛2周，痛处固定，呈刺痛，活动转侧不利，夜寐可，胃纳正常，二便调，舌质偏暗，脉弦。
    expected:
      top1_syndrome: 气滞血瘀证
      acceptable_syndromes: [气滞血瘀证]
      formula_route_any: []   # 急性扭伤不入慢性经验路线，抽身（不给路线）为正确
      safety_status: safe
      red_flag_expected: false
    known_gap: false
  - id: GC004
    description: 中年女性，情志不畅、胀痛定处、舌紫暗
    input_text: 患者女，42岁，近半年工作压力大，情绪抑郁，腰痛3月，胀痛为主，痛有定处，舌紫暗，脉弦，胃纳可，二便调，夜寐一般。
    expected:
      top1_syndrome: 气滞血瘀证
      acceptable_syndromes: [气滞血瘀证]
      formula_route_any: []
      safety_status: safe
      red_flag_expected: false
    known_gap: false
  - id: GC005
    description: 老年女性，久病腰痛、腰膝酸软、骨质疏松
    input_text: 患者女，68岁，腰痛反复5年，腰膝酸软，双膝无力，既往骨质疏松，舌淡，脉细，胃纳可，夜寐安，二便调。
    expected:
      top1_syndrome: 肝肾不足证
      acceptable_syndromes: [肝肾不足证]
      formula_route_any: [独活寄生汤加减, 补肾类方]
      safety_status: caution
      red_flag_expected: false
    known_gap: false
  - id: GC006
    description: 中年男性，腰部冷痛、畏寒肢凉、得温则减
    input_text: 患者男，58岁，腰部冷痛2年，遇寒加重，热敷缓解，畏寒，手脚凉，夜尿多，舌淡，苔白，脉沉，胃纳可，二便调，夜寐可。
    expected:
      top1_syndrome: 肾阳不足证
      acceptable_syndromes: [肾阳不足证]
      formula_route_any: [当归四逆汤加减, 独活寄生汤加减, 补肾类方]
      safety_status: caution
      red_flag_expected: false
    known_gap: false
  - id: GC007
    description: 老年女性，阳虚寒凝为主、兼肝肾亏虚底色
    input_text: 患者女，65岁，腰部冷痛3年，畏寒喜暖，手脚凉，热敷缓解，舌淡胖，脉缓，夜寐可，胃纳可，二便调。
    expected:
      top1_syndrome: 肾阳不足证
      acceptable_syndromes: [肾阳不足证, 肝肾不足证]
      formula_route_any: [独活寄生汤加减, 当归四逆汤加减, 补肾类方]
      safety_status: caution
      red_flag_expected: false
    known_gap: false
  - id: GC008
    description: 年轻女性，口苦口干、寐差多梦、情绪焦虑
    input_text: 患者女，38岁，腰痛2月，久坐办公，口苦，口干，夜寐差，多梦，情绪焦虑，胃纳可，二便调，舌红，脉弦。
    expected:
      top1_syndrome: 少阳气郁证
      acceptable_syndromes: [少阳气郁证]
      formula_route_any: [柴胡类方加减]
      safety_status: safe
      red_flag_expected: false
    known_gap: false
  - id: GC009
    description: 中年男性，情绪抑郁、口苦、失眠多梦
    input_text: 患者男，46岁，腰痛1月，情绪抑郁，口苦，失眠多梦，胃纳可，二便调，舌红，脉弦。
    expected:
      top1_syndrome: 少阳气郁证
      acceptable_syndromes: [少阳气郁证]
      formula_route_any: [柴胡类方加减]
      safety_status: safe
      red_flag_expected: false
    known_gap: false
  - id: GC010
    description: 中年女性，纳差乏力、齿痕舌、脾运不足
    input_text: 患者女，50岁，腰痛8月，劳累后加重，平素乏力，纳差，胃脘不适，舌淡有齿痕，苔白腻，脉细，夜寐可，二便调。
    expected:
      top1_syndrome: 脾虚不运证
      acceptable_syndromes: [脾虚不运证]
      formula_route_any: []   # 现有方线库无健脾主线，顾护中焦以模块表达
      safety_status: safe
      red_flag_expected: false
    known_gap: false
  - id: GC011
    description: 中年男性，久病腰痛兼素有胃病、纳差乏力
    input_text: 患者男，55岁，腰痛反复3年，素有胃病，慢性胃炎多年，胃口差，进食后胃脘不适，乏力明显，恶心，舌淡，脉细，夜寐可，二便调。
    expected:
      top1_syndrome: 脾虚不运证
      acceptable_syndromes: [脾虚不运证]
      formula_route_any: [独活寄生汤加减]
      safety_status: caution
      red_flag_expected: false
    known_gap: false
  - id: GC012
    description: 老年女性，跌倒后腰痛加重（外伤骨折风险红旗）
    input_text: 患者女，71岁，三天前跌倒后腰痛加重，既往骨质疏松，平素腰膝酸软，活动受限，舌淡，脉细，胃纳可，夜寐欠安，二便调。
    expected:
      top1_syndrome: 肝肾不足证
      acceptable_syndromes: [肝肾不足证]
      formula_route_any: [独活寄生汤加减, 补肾类方]
      safety_status: urgent
      red_flag_expected: true
    known_gap: false
  - id: GC013
    description: 中年男性，放射痛伴会阴麻木、尿潴留（马尾综合征红旗）
    input_text: 患者男，45岁，腰痛伴左下肢放射痛1周，今晨出现会阴麻木，尿不出来，大便费力，急来就诊。
    expected:
      top1_syndrome: null      # 先排急症，不给证型判断为正确
      acceptable_syndromes: []
      formula_route_any: []
      safety_status: urgent
      red_flag_expected: true
    known_gap: false
  - id: GC014
    description: 中年男性，夜间痛伴发热寒战（感染红旗）
    input_text: 患者男，52岁，腰痛2周，夜间痛明显，伴发热寒战，体温38.5度，纳差，精神差。
    expected:
      top1_syndrome: null
      acceptable_syndromes: []
      formula_route_any: []
      safety_status: urgent
      red_flag_expected: true
    known_gap: false
  - id: GC015
    description: 中年女性，主诉模糊、四诊无著（刻意模糊病例，弃权为正确）
    input_text: 患者女，44岁，自诉腰部不适1月余，说不清具体性质，时轻时重，休息后可缓解，胃纳可，夜寐可，二便调，舌淡红，苔薄白，脉平。
    expected:
      top1_syndrome: null
      acceptable_syndromes: []
      formula_route_any: []
      safety_status: safe
      red_flag_expected: false
    known_gap: false
  - id: GC016
    description: 青年男性，腰部灼热、苔黄腻（湿热痹阻——现有规则库无此证型）
    input_text: 患者男，39岁，腰痛1月，伴腰部灼热感，口干口苦，小便色黄，苔黄腻，脉滑，天热时加重。
    expected:
      top1_syndrome: 湿热痹阻证
      acceptable_syndromes: [湿热痹阻证]
      formula_route_any: [四妙丸加减]
      safety_status: safe
      red_flag_expected: false
    # Engine has no damp-heat syndrome rule or 四妙丸 route; it currently
    # mislabels this presentation as 少阳气郁证 via 口苦/口干. Counted as a
    # known gap, not gamed into the accuracy numbers.
    known_gap: true
