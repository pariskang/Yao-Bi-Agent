runtime:
  default_backend: disabled
  # http = generic OpenAI-compatible endpoint; openai/poe/minimax/azure reuse the same wire
  # path with provider defaults (endpoint, auth header, error surface) — see README.
  supported_backends: [disabled, mock, http, openai, poe, minimax, azure, anthropic, transformers]
  env:
    backend: TAO_BACKEND
    endpoint_url: TAO_ENDPOINT_URL
    api_key: TAO_API_KEY  # provider fallbacks: OPENAI_API_KEY / POE_API_KEY / MINIMAX_API_KEY / AZURE_OPENAI_API_KEY / ANTHROPIC_API_KEY
    azure_endpoint: AZURE_OPENAI_ENDPOINT
    azure_deployment: TAO_AZURE_DEPLOYMENT  # fallback AZURE_OPENAI_DEPLOYMENT, else TAO_MODEL_ID
    azure_api_version: TAO_AZURE_API_VERSION  # fallback AZURE_OPENAI_API_VERSION, default 2024-06-01; "v1" selects the /openai/v1 surface
    egress_allowed_hosts: YAOBI_EGRESS_ALLOWED_HOSTS  # optional comma-separated host allowlist; HTTPS enforced for non-local endpoints
    torch_dtype: TAO_TORCH_DTYPE
    device_map: TAO_DEVICE_MAP
    attn_implementation: TAO_ATTN_IMPLEMENTATION
    model_id: TAO_MODEL_ID
  direct_transformers_inference:
    enabled_backend: transformers
    cli: TAO_BACKEND=transformers python -m backend.main --tao-chat "请解释本案规则线索" --stream
    model_id: CMLM/Dao1-30b-a3b
    trust_remote_code: true
    device_map: auto
    attn_implementation: eager
  output_contract:
    format: json_object
    required_key: markdown_report
    json_repair: true
    guardrail: no_final_diagnosis_no_patient_executable_prescription_no_dose
    fallback: deterministic_report
model:
  id: CMLM/Dao1-30b-a3b
  base: Qwen3-30B-A3B
  architecture: sparse_moe
  total_parameters: 30B
  active_parameters: 3B
  role: explanation_only
  license_boundary: non_commercial_non_medical_research
inference_profiles:
  research_report:
    temperature: 0.3
    top_p: 0.85
    repetition_penalty: 1.1
    max_new_tokens: 3072
    do_sample: true
  teaching_explanation:
    temperature: 0.6
    top_p: 0.9
    repetition_penalty: 1.1
    max_new_tokens: 3072
    do_sample: true
  structured_json:
    temperature: 0.1
    top_p: 0.8
    repetition_penalty: 1.05
    max_new_tokens: 1024
    do_sample: false
prohibited_roles:
  - final_diagnosis
  - patient_executable_prescription
  - dose_instruction
  - replacement_for_clinician
